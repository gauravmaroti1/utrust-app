<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Utrust CRM 2.0 — Prakash Toyota</title>
<style>
:root{--bg:#07080a;--sur:#0f1117;--sur2:#161b24;--sur3:#1c2232;--bdr:#1e2738;--bdr2:#28354a;--bdr3:#2e3f5a;--acc:#f5a623;--acc2:#e8912a;--adim:rgba(245,166,35,0.1);--adim2:rgba(245,166,35,0.18);--grn:#22c55e;--gdim:rgba(34,197,94,0.1);--gdim2:rgba(34,197,94,0.18);--red:#ef4444;--rdim:rgba(239,68,68,0.1);--rdim2:rgba(239,68,68,0.18);--blu:#3b82f6;--bdim:rgba(59,130,246,0.1);--pur:#a855f7;--pdim:rgba(168,85,247,0.1);--cyn:#06b6d4;--ora:#f97316;--txt:#dde3f0;--tx2:#8a96b0;--tx3:#4a5470;--tx4:#2a3350;--r:8px;--r2:12px;--r3:16px;--shadow2:0 8px 48px rgba(0,0,0,0.6);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;font-size:14px;line-height:1.5;min-height:100vh;overflow-x:hidden;}
#root{display:flex;min-height:100vh;}
.sb{width:220px;min-height:100vh;background:var(--sur);border-right:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto;z-index:40;}
.sb-logo{padding:14px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px;}
.sb-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.sb-name{font-size:14px;font-weight:800;}.sb-ver{font-size:9px;color:var(--tx3);font-family:monospace;margin-top:1px;}
.sb-user{padding:10px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:9px;}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0;}
.av.admin{background:rgba(168,85,247,0.2);color:var(--pur);border:1px solid rgba(168,85,247,0.3);}
.av.leader{background:var(--bdim);color:var(--blu);border:1px solid rgba(59,130,246,0.3);}
.av.officer{background:var(--gdim);color:var(--grn);border:1px solid rgba(34,197,94,0.3);}
.sb-uname{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-urole{font-size:9px;color:var(--tx3);font-family:monospace;text-transform:uppercase;}
.sb-ubranch{font-size:9px;color:var(--acc);font-family:monospace;}
.nav-area{flex:1;padding:6px 0;overflow-y:auto;}
.sb-sec{padding:10px 14px 3px;font-size:9px;font-weight:700;color:var(--tx4);letter-spacing:0.12em;text-transform:uppercase;font-family:monospace;}
.nav-it{display:flex;align-items:center;gap:9px;padding:8px 12px;cursor:pointer;transition:all 0.12s;font-size:12px;color:var(--tx2);font-weight:500;position:relative;margin:1px 6px;border-radius:var(--r);}
.nav-it:hover{background:var(--sur2);color:var(--txt);}
.nav-it.active{background:var(--adim2);color:var(--acc);}
.nav-it.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:55%;background:var(--acc);border-radius:0 2px 2px 0;}
.nav-ic{width:16px;text-align:center;font-size:13px;flex-shrink:0;}
.nav-txt{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nav-bd{background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;min-width:16px;text-align:center;}
.nav-bd.acc{background:var(--acc);color:#000;}
.sb-foot{padding:12px 14px;border-top:1px solid var(--bdr);}
.db-status{display:flex;align-items:center;gap:5px;font-size:10px;font-family:monospace;color:var(--tx3);margin-bottom:8px;}
.db-dot{width:6px;height:6px;border-radius:50%;}
.logout-btn{width:100%;padding:7px;background:transparent;border:1px solid var(--bdr);border-radius:var(--r);color:var(--tx3);font-size:11px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:5px;font-family:inherit;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{padding:10px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;background:var(--sur);position:sticky;top:0;z-index:10;gap:10px;flex-wrap:wrap;}
.tb-title{font-size:15px;font-weight:800;}.tb-sub{font-size:10px;color:var(--tx3);}
.content{flex:1;padding:18px;overflow-y:auto;}
.btn{padding:7px 13px;border-radius:var(--r);border:none;cursor:pointer;font-size:12px;font-weight:600;transition:all 0.15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;font-family:inherit;}
.btn-acc{background:var(--acc);color:#000;}.btn-acc:hover{background:var(--acc2);}
.btn-ghost{background:var(--sur2);color:var(--tx2);border:1px solid var(--bdr);}.btn-ghost:hover{color:var(--txt);border-color:var(--bdr2);}
.btn-danger{background:var(--rdim);color:var(--red);border:1px solid rgba(239,68,68,0.2);}.btn-danger:hover{background:var(--rdim2);}
.btn-success{background:var(--gdim);color:var(--grn);border:1px solid rgba(34,197,94,0.2);}.btn-success:hover{background:var(--gdim2);}
.btn-blue{background:var(--bdim);color:var(--blu);border:1px solid rgba(59,130,246,0.2);}
.btn-pur{background:var(--pdim);color:var(--pur);border:1px solid rgba(168,85,247,0.2);}
.btn-sm{padding:4px 9px;font-size:11px;}.btn-lg{padding:12px 22px;font-size:14px;font-weight:700;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:9px;font-weight:700;color:var(--tx3);margin-bottom:4px;letter-spacing:0.08em;text-transform:uppercase;}
.inp{width:100%;background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--r);padding:9px 12px;color:var(--txt);font-size:13px;transition:border-color 0.15s;outline:none;font-family:inherit;}
.inp:focus{border-color:var(--acc);}.inp::placeholder{color:var(--tx3);}
select.inp option{background:var(--sur2);}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;}.s2{grid-column:span 2;}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
.sc{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r2);padding:14px;position:relative;overflow:hidden;}
.sc-lbl{font-size:9px;color:var(--tx3);font-family:monospace;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px;}
.sc-val{font-size:22px;font-weight:800;margin-bottom:2px;letter-spacing:-0.02em;}.sc-sub{font-size:10px;color:var(--tx2);}
.sc-ico{position:absolute;top:12px;right:12px;font-size:20px;opacity:0.15;}
.sc-bar{height:3px;background:var(--bdr);border-radius:2px;margin-top:8px;overflow:hidden;}
.sc-bar-fill{height:100%;border-radius:2px;background:var(--acc);transition:width 0.5s;}
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r2);overflow:hidden;margin-bottom:14px;}
.card-hdr{padding:12px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.card-ttl{font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;}
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{padding:8px 12px;text-align:left;font-size:9px;font-weight:700;color:var(--tx3);letter-spacing:0.08em;text-transform:uppercase;font-family:monospace;border-bottom:1px solid var(--bdr);background:var(--sur2);white-space:nowrap;}
td{padding:10px 12px;border-bottom:1px solid var(--bdr);font-size:12px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,0.012);}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:700;font-family:monospace;white-space:nowrap;}
.b-pend{background:rgba(245,166,35,0.15);color:var(--acc);border:1px solid rgba(245,166,35,0.25);}
.b-appr{background:var(--gdim);color:var(--grn);border:1px solid rgba(34,197,94,0.25);}
.b-rejt{background:var(--rdim);color:var(--red);border:1px solid rgba(239,68,68,0.25);}
.b-drft{background:var(--sur3);color:var(--tx3);border:1px solid var(--bdr2);}
.b-hot{background:var(--rdim);color:var(--red);border:1px solid rgba(239,68,68,0.25);}
.b-warm{background:var(--adim);color:var(--acc);border:1px solid rgba(245,166,35,0.25);}
.b-cold{background:var(--bdim);color:var(--blu);border:1px solid rgba(59,130,246,0.25);}
.b-won{background:var(--gdim);color:var(--grn);border:1px solid rgba(34,197,94,0.25);}
.b-lost{background:var(--rdim);color:var(--red);border:1px solid rgba(239,68,68,0.25);}
.btag{display:inline-block;font-size:9px;font-family:monospace;color:var(--acc);background:var(--adim);padding:2px 6px;border-radius:4px;border:1px solid rgba(245,166,35,0.2);}
.steps{display:flex;background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r2);overflow-x:auto;margin-bottom:16px;}
.step{flex:0 0 auto;padding:9px 7px;text-align:center;font-size:9px;font-weight:700;color:var(--tx3);letter-spacing:0.04em;text-transform:uppercase;border-right:1px solid var(--bdr);cursor:pointer;transition:all 0.15s;min-width:58px;}
.step:last-child{border-right:none;}.step.active{background:var(--adim);color:var(--acc);}.step.done{background:var(--gdim);color:var(--grn);}
.step-n{display:block;font-size:14px;font-weight:800;margin-bottom:1px;}
.fcard{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r2);padding:18px;margin-bottom:12px;}
.fcard-ttl{font-size:13px;font-weight:700;margin-bottom:2px;}.fcard-sub{font-size:11px;color:var(--tx3);margin-bottom:14px;}
.ck-item{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--sur2);border-radius:var(--r);border:1px solid var(--bdr);margin-bottom:7px;flex-wrap:wrap;gap:7px;}
.ck-lbl{font-size:12px;font-weight:500;flex:1;}.ck-req{font-size:9px;color:var(--red);font-family:monospace;margin-left:4px;}
.ck-btns{display:flex;gap:4px;}
.ck-btn{padding:3px 9px;border-radius:4px;border:1px solid var(--bdr);background:transparent;font-size:10px;font-weight:600;cursor:pointer;font-family:monospace;transition:all 0.12s;color:var(--tx3);}
.ck-btn.good{border-color:var(--grn);color:var(--grn);background:var(--gdim);}
.ck-btn.warn{border-color:var(--acc);color:var(--acc);background:var(--adim);}
.ck-btn.bad{border-color:var(--red);color:var(--red);background:var(--rdim);}
.rating{display:flex;gap:4px;flex-wrap:wrap;}
.r-btn{width:34px;height:34px;border-radius:var(--r);border:1px solid var(--bdr);background:var(--sur2);color:var(--tx3);font-weight:700;font-size:12px;cursor:pointer;transition:all 0.12s;}
.r-btn:hover{border-color:var(--acc);color:var(--acc);}.r-btn.sel{background:var(--acc);border-color:var(--acc);color:#000;}
.algo-box{background:var(--sur3);border:1px solid var(--bdr2);border-radius:var(--r2);padding:16px;margin-bottom:12px;}
.algo-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--bdr);font-size:11px;}
.algo-row:last-child{border-bottom:none;}.algo-key{color:var(--tx2);flex:1;padding-right:8px;}.algo-val{font-family:monospace;font-weight:600;text-align:right;font-size:11px;}
.price-band{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:12px 0;}
.pb-card{border-radius:var(--r2);padding:14px;text-align:center;border:1px solid;}
.pb-lbl{font-size:9px;font-family:monospace;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;}.pb-val{font-size:18px;font-weight:800;font-family:monospace;}.pb-sub{font-size:9px;margin-top:4px;opacity:0.7;}
.pb-min{background:var(--rdim);border-color:rgba(239,68,68,0.25);color:var(--red);}
.pb-ideal{background:var(--gdim2);border-color:rgba(34,197,94,0.35);color:var(--grn);}
.pb-max{background:var(--bdim);border-color:rgba(59,130,246,0.25);color:var(--blu);}
.kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;overflow-x:auto;}
.kanban-col{background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--r2);min-width:160px;}
.kanban-hdr{padding:10px 12px;border-bottom:1px solid var(--bdr);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;display:flex;justify-content:space-between;align-items:center;}
.kanban-body{padding:8px;min-height:100px;}
.lead-card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:10px;margin-bottom:7px;cursor:pointer;transition:all 0.12s;}
.lead-card:hover{border-color:var(--bdr3);transform:translateY(-1px);}
.lead-name{font-size:12px;font-weight:600;margin-bottom:3px;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;display:flex;align-items:center;justify-content:center;padding:12px;backdrop-filter:blur(6px);}
.modal{background:var(--sur);border:1px solid var(--bdr2);border-radius:var(--r3);padding:22px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow2);}
.modal-ttl{font-size:16px;font-weight:700;margin-bottom:3px;}.modal-sub{font-size:11px;color:var(--tx3);margin-bottom:16px;}
.modal-acts{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;flex-wrap:wrap;}
.cam-slot{background:var(--sur2);border:2px dashed var(--bdr2);border-radius:var(--r2);overflow:hidden;cursor:pointer;transition:all 0.2s;}
.cam-slot:hover{border-color:var(--acc);}.cam-slot.captured{border-style:solid;border-color:var(--grn);}
.cam-preview{aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;background:#000;overflow:hidden;}
.cam-lbl{font-size:9px;text-align:center;padding:5px;color:var(--tx3);font-family:monospace;}
.cam-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.cam-modal{position:fixed;inset:0;background:rgba(0,0,0,0.97);z-index:600;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px;gap:10px;}
.shutter{width:62px;height:62px;border-radius:50%;background:var(--acc);border:4px solid rgba(255,255,255,0.25);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;}
.tabs{display:flex;gap:2px;background:var(--sur2);padding:3px;border-radius:var(--r2);margin-bottom:16px;border:1px solid var(--bdr);overflow-x:auto;}
.tab{flex:1;padding:6px 8px;text-align:center;font-size:11px;font-weight:600;color:var(--tx3);cursor:pointer;border-radius:var(--r);transition:all 0.15s;white-space:nowrap;min-width:70px;}
.tab.active{background:var(--sur);color:var(--txt);box-shadow:0 1px 4px rgba(0,0,0,0.4);}
.bar-chart{display:flex;flex-direction:column;gap:8px;}
.bar-row{display:flex;align-items:center;gap:8px;}
.bar-lbl{font-size:10px;color:var(--tx2);text-align:right;flex-shrink:0;width:85px;}
.bar-track{flex:1;height:7px;background:var(--sur2);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;background:var(--acc);transition:width 0.4s;}
.bar-val{width:32px;font-size:10px;color:var(--tx3);font-family:monospace;text-align:right;}
.login-screen{width:100%;min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 30% 50%,rgba(245,166,35,0.05) 0%,transparent 60%),var(--bg);padding:16px;}
.login-card{background:var(--sur);border:1px solid var(--bdr2);border-radius:var(--r3);padding:32px 26px;width:100%;max-width:400px;box-shadow:var(--shadow2);}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:22px;}
.login-logo-icon{width:44px;height:44px;border-radius:11px;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-size:21px;}
.btn-primary{width:100%;padding:12px;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#000;border:none;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;transition:all 0.15s;font-family:inherit;}
.btn-primary:hover{opacity:0.9;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.detail-card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r2);padding:14px;}
.detail-card-ttl{font-size:12px;font-weight:700;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--bdr);}
.drow{display:flex;justify-content:space-between;align-items:flex-start;padding:5px 0;border-bottom:1px solid var(--bdr);font-size:11px;gap:8px;}
.drow:last-child{border-bottom:none;}.dkey{color:var(--tx3);flex-shrink:0;}.dval{font-weight:600;text-align:right;word-break:break-word;max-width:60%;}
.photo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.photo-thumb{aspect-ratio:4/3;background:var(--sur2);border-radius:6px;border:1px solid var(--bdr);overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.photo-thumb:hover{border-color:var(--acc);}
.upzone{border:2px dashed var(--bdr2);border-radius:var(--r2);padding:18px 12px;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--sur2);}
.upzone:hover{border-color:var(--acc);}.upzone.done{border-style:solid;border-color:var(--grn);background:var(--gdim);}
.search-bar{display:flex;align-items:center;gap:7px;background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--r);padding:7px 11px;}
.search-bar input{background:none;border:none;outline:none;color:var(--txt);font-size:12px;min-width:0;flex:1;font-family:inherit;}
.toast{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:var(--sur);border:1px solid var(--bdr2);border-radius:var(--r2);padding:10px 16px;font-size:12px;font-weight:600;z-index:999;box-shadow:var(--shadow2);display:flex;align-items:center;gap:7px;white-space:nowrap;max-width:calc(100vw - 24px);animation:slideUp 0.25s ease;}
@keyframes slideUp{from{transform:translateX(-50%) translateY(12px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
.toast.success{border-left:3px solid var(--grn);}.toast.error{border-left:3px solid var(--red);}.toast.info{border-left:3px solid var(--acc);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}.pulse{animation:pulse 2s infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){
  #root{flex-direction:column;}
  .sb{width:100%;min-height:auto;height:auto;flex-direction:row;align-items:center;position:sticky;top:0;overflow-x:auto;overflow-y:hidden;border-right:none;border-bottom:1px solid var(--bdr);}
  .sb-logo{padding:8px 11px;border-bottom:none;border-right:1px solid var(--bdr);flex-shrink:0;}
  .sb-user{padding:6px 10px;border-bottom:none;border-right:1px solid var(--bdr);flex-shrink:0;}
  .sb-uname,.sb-urole,.sb-ubranch,.sb-sec,.nav-txt,.nav-bd,.sb-ver{display:none;}
  .nav-area{display:flex;flex:1;overflow-x:auto;align-items:center;padding:0 3px;}
  .nav-it{flex-direction:column;padding:5px 8px;margin:2px 1px;min-width:44px;gap:1px;flex-shrink:0;}
  .nav-ic{font-size:15px;width:auto;}
  .sb-foot{padding:6px 10px;border-top:none;border-left:1px solid var(--bdr);margin-left:auto;flex-shrink:0;}
  .db-status,.logout-btn span{display:none;}.logout-btn{padding:6px 8px;}
  .content{padding:12px;}.sg{grid-template-columns:1fr 1fr;}.sc-val{font-size:18px;}
  .fg{grid-template-columns:1fr!important;}.s2{grid-column:span 1!important;}
  .fcard{padding:13px;}.detail-grid{grid-template-columns:1fr;}.photo-grid{grid-template-columns:repeat(3,1fr);}
  .kanban{grid-template-columns:repeat(3,1fr);}.modal{padding:16px;}.topbar{padding:8px 12px;}.price-band{grid-template-columns:1fr;}
}
@media(max-width:480px){.sg{grid-template-columns:1fr;}.kanban{grid-template-columns:repeat(2,1fr);}}
@media(min-width:769px) and (max-width:1050px){
  .sb{width:52px;}
  .sb-name,.sb-ver,.sb-uname,.sb-urole,.sb-ubranch,.sb-sec,.nav-txt,.nav-bd{display:none;}
