<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Utrust — Vehicle Management</title>
<style>
:root{--bg:#0a0b0d;--sur:#111318;--sur2:#181c23;--sur3:#1e2330;--bdr:#252b38;--bdr2:#2e3545;--acc:#f5a623;--acc2:#e8912a;--adim:rgba(245,166,35,0.12);--grn:#22c55e;--gdim:rgba(34,197,94,0.12);--red:#ef4444;--rdim:rgba(239,68,68,0.12);--blu:#3b82f6;--bdim:rgba(59,130,246,0.12);--pur:#a855f7;--txt:#e8eaf0;--tx2:#9aa3b8;--tx3:#5a6480;--r:8px;--r2:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.5;min-height:100vh;}
#root{display:flex;min-height:100vh;}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;background:var(--bg);}
.loading-icon{width:52px;height:52px;background:var(--acc);border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:26px;}
.loading-spinner{width:24px;height:24px;border:3px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
/* SIDEBAR */
.sb{width:230px;min-height:100vh;background:var(--sur);border-right:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto;z-index:40;}
.sb-logo{padding:16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px;}
.sb-icon{width:34px;height:34px;border-radius:8px;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.sb-name{font-size:15px;font-weight:800;letter-spacing:-0.01em;}
.sb-user{padding:12px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px;}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;letter-spacing:0.02em;}
.av.admin{background:rgba(168,85,247,0.2);color:var(--pur);border:1px solid rgba(168,85,247,0.3);}
.av.leader{background:var(--bdim);color:var(--blu);border:1px solid rgba(59,130,246,0.3);}
.av.officer{background:var(--gdim);color:var(--grn);border:1px solid rgba(34,197,94,0.3);}
.sb-uname{font-size:12px;font-weight:600;line-height:1.2;}
.sb-urole{font-size:10px;color:var(--tx3);font-family:monospace;}
.sb-ubranch{font-size:10px;color:var(--acc);font-family:monospace;}
.nav-area{flex:1;padding:8px 0;}
.sb-sec{padding:10px 14px 4px;font-size:9px;font-weight:700;color:var(--tx3);letter-spacing:0.1em;text-transform:uppercase;font-family:monospace;}
.nav-it{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;transition:all 0.15s;font-size:13px;color:var(--tx2);font-weight:500;position:relative;margin:1px 8px;border-radius:var(--r);}
.nav-it:hover{background:var(--sur2);color:var(--txt);}
.nav-it.active{background:var(--adim);color:var(--acc);}
.nav-it.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--acc);border-radius:0 2px 2px 0;}
.nav-ic{width:18px;text-align:center;font-size:14px;flex-shrink:0;}
.nav-bd{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center;}
.sb-foot{margin-top:auto;padding:14px;border-top:1px solid var(--bdr);}
.logout-btn{width:100%;padding:8px;background:transparent;border:1px solid var(--bdr);border-radius:var(--r);color:var(--tx3);font-size:12px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:6px;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{padding:12px 22px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;background:var(--sur);position:sticky;top:0;z-index:10;flex-wrap:wrap;gap:8px;}
.tb-title{font-size:16px;font-weight:800;letter-spacing:-0.01em;}
.tb-sub{font-size:11px;color:var(--tx3);}
.content{flex:1;padding:20px;overflow-y:auto;}
/* BUTTONS */
.btn{padding:7px 14px;border-radius:var(--r);border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
.btn-acc{background:var(--acc);color:#000;}
.btn-acc:hover{background:var(--acc2);}
.btn-ghost{background:var(--sur2);color:var(--tx2);border:1px solid var(--bdr);}
.btn-ghost:hover{color:var(--txt);border-color:var(--bdr2);}
.btn-danger{background:var(--rdim);color:var(--red);border:1px solid rgba(239,68,68,0.25);}
.btn-danger:hover{background:rgba(239,68,68,0.2);}
.btn-success{background:var(--gdim);color:var(--grn);border:1px solid rgba(34,197,94,0.25);}
.btn-success:hover{background:rgba(34,197,94,0.2);}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-lg{padding:12px 22px;font-size:15px;font-weight:700;}
/* FORMS */
.field{margin-bottom:14px;}
.field label{display:block;font-size:10px;font-weight:700;color:var(--tx3);margin-bottom:5px;letter-spacing:0.07em;text-transform:uppercase;}
.field input,.field select,.field textarea{width:100%;background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--r);padding:10px 13px;color:var(--txt);font-size:14px;transition:border-color 0.15s;outline:none;font-family:inherit;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--acc);}
.field select option{background:var(--sur2);}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.s2{grid-column:span 2;}
/* STATS */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.sc{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r2);padding:16px;position:relative;overflow:hidden;}
.sc-lbl{font-size:10px;color:var(--tx3);font-family:monospace;letter-spacing:0.07em;text-transform:uppercase;margin-bottom:7px;}
.sc-val{font-size:24px;font-weight:800;margin-bottom:3px;letter-spacing:-0.02em;}
.sc-sub{font-size:11px;color:var(--grn);}
.sc-ico{position:absolute;top:14px;right:14px;font-size:22px;opacity:0.2;}
/* CARDS */
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r2);overflow:hidden;}
.card-hdr{padding:13px 18px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.card-ttl{font-size:14px;font-weight:700;}
/* TABLE */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{padding:9px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:0.07em;text-transform:uppercase;font-family:monospace;border-bottom:1px solid var(--bdr);background:var(--sur2);white-space:nowrap;}
td{padding:11px 14px;border-bottom:1px solid var(--bdr);font-size:13px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,0.015);}
/* BADGE */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;font-family:monospace;white-space:nowrap;}
.b-pend{background:rgba(245,166,35,0.15);color:var(--acc);border:1px solid rgba(245,166,35,0.25);}
.b-appr{background:var(--gdim);color:var(--grn);border:1px solid rgba(34,197,94,0.25);}
.b-rejt{background:var(--rdim);color:var(--red);border:1px solid rgba(239,68,68,0.25);}
.b-drft{background:var(--sur3);color:var(--tx3);border:1px solid var(--bdr2);}
/* STEPS */
.steps{display:flex;background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r2);overflow-x:auto;margin-bottom:20px;flex-shrink:0;}
.step{flex:0 0 auto;padding:10px 8px;text-align:center;font-size:9px;font-weight:700;color:var(--tx3);letter-spacing:0.04em;text-transform:uppercase;border-right:1px solid var(--bdr);cursor:pointer;transition:all 0.15s;min-width:64px;}
.step:last-child{border-right:none;}
.step.active{background:var(--adim);color:var(--acc);}
.step.done{background:var(--gdim);color:var(--grn);}
.step-n{display:block;font-size:15px;font-weight:800;margin-bottom:1px;}
.fcard{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r2);padding:20px;margin-bottom:14px;}
.fcard-ttl{font-size:14px;font-weight:700;margin-bottom:3px;}
.fcard-sub{font-size:12px;color:var(--tx3);margin-bottom:16px;}
/* CAMERA */
.cam-slot{background:var(--sur2);border:2px dashed var(--bdr2);border-radius:var(--r2);overflow:hidden;cursor:pointer;transition:all 0.2s;}
.cam-slot:hover{border-color:var(--acc);}
.cam-slot.captured{border-style:solid;border-color:var(--grn);}
.cam-preview{aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;background:#000;overflow:hidden;}
.cam-lbl{font-size:10px;text-align:center;padding:6px;color:var(--tx3);font-family:monospace;background:var(--sur2);}
.cam-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.cam-modal{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:600;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;gap:10px;}
.shutter{width:64px;height:64px;border-radius:50%;background:var(--acc);border:4px solid rgba(255,255,255,0.3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
/* CHECKLIST */
.ck-item{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;background:var(--sur2);border-radius:var(--r);border:1px solid var(--bdr);margin-bottom:8px;flex-wrap:wrap;gap:8px;}
.ck-lbl{font-size:13px;font-weight:500;}
.ck-btns{display:flex;gap:5px;flex-wrap:wrap;}
.ck-btn{padding:4px 10px;border-radius:4px;border:1px solid var(--bdr);background:transparent;font-size:11px;font-weight:600;cursor:pointer;font-family:monospace;transition:all 0.12s;color:var(--tx3);}
.ck-btn.good{border-color:var(--grn);color:var(--grn);background:var(--gdim);}
.ck-btn.warn{border-color:var(--acc);color:var(--acc);background:var(--adim);}
.ck-btn.bad{border-color:var(--red);color:var(--red);background:var(--rdim);}
/* RATING */
.rating{display:flex;gap:5px;flex-wrap:wrap;}
.r-btn{width:36px;height:36px;border-radius:var(--r);border:1px solid var(--bdr);background:var(--sur2);color:var(--tx3);font-weight:700;font-size:13px;cursor:pointer;transition:all 0.12s;}
.r-btn:hover{border-color:var(--acc);color:var(--acc);}
.r-btn.sel{background:var(--acc);border-color:var(--acc);color:#000;}
/* ALGO */
.algo-box{background:var(--sur3);border:1px solid var(--bdr2);border-radius:var(--r2);padding:18px;margin-bottom:14px;}
.algo-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--bdr);font-size:12px;}
.algo-row:last-child{border-bottom:none;}
.algo-key{color:var(--tx3);flex:1;padding-right:10px;}
.algo-val{font-family:monospace;font-weight:600;text-align:right;}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;display:flex;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(4px);}
.modal{background:var(--sur);border:1px solid var(--bdr2);border-radius:16px;padding:24px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:0 40px 80px rgba(0,0,0,0.5);}
.modal-ttl{font-size:18px;font-weight:700;margin-bottom:4px;}
.modal-sub{font-size:12px;color:var(--tx3);margin-bottom:18px;}
.modal-acts{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;}
/* UPLOAD */
.upzone{border:2px dashed var(--bdr2);border-radius:var(--r2);padding:20px 14px;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--sur2);}
.upzone:hover{border-color:var(--acc);}
.upzone.done{border-style:solid;border-color:var(--grn);background:var(--gdim);}
/* SEARCH */
.search-bar{display:flex;align-items:center;gap:8px;background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--r);padding:8px 12px;}
.search-bar input{background:none;border:none;outline:none;color:var(--txt);font-size:13px;min-width:0;flex:1;font-family:inherit;}
/* TOAST */
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--sur);border:1px solid var(--bdr2);border-radius:var(--r2);padding:12px 18px;font-size:13px;font-weight:600;z-index:999;box-shadow:0 16px 40px rgba(0,0,0,0.5);display:flex;align-items:center;gap:8px;white-space:nowrap;max-width:calc(100vw - 28px);animation:slideUp 0.3s ease;}
@keyframes slideUp{from{transform:translateX(-50%) translateY(16px);opacity:0;}to{transform:translateX(-50%) translateY(0);opacity:1;}}
.toast.success{border-left:3px solid var(--grn);}
.toast.error{border-left:3px solid var(--red);}
.toast.info{border-left:3px solid var(--acc);}
/* LOGIN */
.login-screen{width:100%;min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:16px;}
.login-card{background:var(--sur);border:1px solid var(--bdr2);border-radius:16px;padding:36px 28px;width:100%;max-width:420px;box-shadow:0 40px 80px rgba(0,0,0,0.6);}
.login-logo{display:flex;align-items:center;gap:13px;margin-bottom:24px;}
.login-logo-icon{width:46px;height:46px;border-radius:11px;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:22px;}
.btn-primary{width:100%;padding:13px;background:var(--acc);color:#000;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;transition:all 0.15s;letter-spacing:0.01em;}
.btn-primary:hover{background:var(--acc2);}
/* DETAIL */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.detail-card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r2);padding:16px;}
.detail-card-ttl{font-size:13px;font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--bdr);}
.drow{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--bdr);font-size:12px;gap:8px;}
.drow:last-child{border-bottom:none;}
.dkey{color:var(--tx3);flex-shrink:0;}
.dval{font-weight:600;text-align:right;word-break:break-word;}
.photo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
.photo-thumb{aspect-ratio:4/3;background:var(--sur2);border-radius:6px;border:1px solid var(--bdr);overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.photo-thumb:hover{border-color:var(--acc);}
/* TABS */
.tabs{display:flex;gap:3px;background:var(--sur2);padding:4px;border-radius:var(--r2);margin-bottom:18px;border:1px solid var(--bdr);overflow-x:auto;}
.tab{flex:1;padding:7px 8px;text-align:center;font-size:11px;font-weight:600;color:var(--tx3);cursor:pointer;border-radius:var(--r);transition:all 0.15s;white-space:nowrap;min-width:80px;}
.tab.active{background:var(--sur);color:var(--txt);box-shadow:0 1px 4px rgba(0,0,0,0.3);}
/* BAR CHART */
.bar-chart{display:flex;flex-direction:column;gap:10px;}
.bar-row{display:flex;align-items:center;gap:10px;}
.bar-lbl{font-size:11px;color:var(--tx2);text-align:right;flex-shrink:0;width:90px;}
.bar-track{flex:1;height:8px;background:var(--sur2);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;background:var(--acc);transition:width 0.4s;}
.bar-val{width:36px;font-size:11px;color:var(--tx3);font-family:monospace;}
/* USER CARD */
.user-card{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r2);margin-bottom:10px;flex-wrap:wrap;}
.btag{display:inline-block;font-size:9px;font-family:monospace;color:var(--acc);background:var(--adim);padding:2px 6px;border-radius:4px;border:1px solid rgba(245,166,35,0.2);}
/* STATUS indicator */
.db-dot{width:7px;height:7px;border-radius:50%;display:inline-block;}
/* MOBILE */
@media(max-width:768px){
  #root{flex-direction:column;}
  .sb{width:100%;min-height:auto;height:auto;flex-direction:row;align-items:center;position:sticky;top:0;overflow-x:auto;overflow-y:hidden;border-right:none;border-bottom:1px solid var(--bdr);}
  .sb-logo{padding:10px 12px;border-bottom:none;border-right:1px solid var(--bdr);flex-shrink:0;}
  .sb-user{padding:8px 10px;border-bottom:none;border-right:1px solid var(--bdr);flex-shrink:0;}
  .sb-uname{font-size:11px;} .sb-urole,.sb-ubranch{display:none;}
  .sb-sec{display:none;}
  .nav-area{display:flex;flex:1;overflow-x:auto;align-items:center;padding:0 4px;}
  .nav-it{flex-direction:column;padding:6px 9px;margin:3px 2px;min-width:50px;gap:2px;flex-shrink:0;}
  .nav-txt{font-size:9px;}
  .nav-ic{font-size:16px;width:auto;}
  .sb-foot{margin-top:0;padding:8px 10px;border-top:none;border-left:1px solid var(--bdr);margin-left:auto;flex-shrink:0;}
  .main{min-height:0;}
  .content{padding:12px;}
  .sg{grid-template-columns:1fr 1fr;}
  .sc{padding:12px;} .sc-val{font-size:20px;}
  .fg{grid-template-columns:1fr!important;}
  .s2{grid-column:span 1!important;}
  .fcard{padding:14px;}
  .detail-grid{grid-template-columns:1fr;}
  .photo-grid{grid-template-columns:repeat(3,1fr);}
  .cam-grid{grid-template-columns:1fr 1fr;}
  .modal{padding:18px;}
  .topbar{padding:10px 12px;}
}
@media(max-width:400px){
  .sg{grid-template-columns:1fr;}
  .nav-txt{display:none;}
  .nav-it{min-width:40px;}
}
@media(min-width:769px) and (max-width:1100px){
  .sb{width:56px;}
  .sb-name,.sb-uname,.sb-urole,.sb-ubranch,.sb-sec,.nav-txt,.nav-bd{display:none;}
  .nav-it{justify-content:center;padding:10px;}
  .sb-user{justify-content:center;}
  .sg{grid-template-columns:1fr 1fr;}
  .detail-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div id="root">
  <div class="loading-screen">
    <div class="loading-icon">🚗</div>
    <div style="font-size:20px;font-weight:800;color:#e8eaf0">Utrust</div>
    <div class="loading-spinner"></div>
    <div style="font-size:11px;color:#5a6480;font-family:monospace">Loading application...</div>
  </div>
</div>

<!-- React 18 - served locally, no CDN dependency -->
<script src="/js/react.min.js"></script>
<script src="/js/react-dom.min.js"></script>

<!-- Firebase - served locally, no CDN dependency -->
<script src="/js/firebase-app.js"></script>
<script src="/js/firebase-firestore.js"></script>

<script>
// ── FIREBASE ─────────────────────────────────────────────
var fbDb = null;
try {
  firebase.initializeApp({
    apiKey:"AIzaSyDazZSs72-ObVlMWcfCryKh7hwTtUmQ_LA",
    authDomain:"utrust-app.firebaseapp.com",
    projectId:"utrust-app"
  });
  fbDb = firebase.firestore();
} catch(e) { console.warn("Firebase:",e.message); }

function compressImg(url, maxW, q) {
  return new Promise(function(res){
    if (!url||!url.startsWith('data:')){res(url);return;}
    var img=new Image(); img.onload=function(){
      var sc=Math.min(1,(maxW||640)/img.width);
      var c=document.createElement('canvas');
      c.width=Math.round(img.width*sc); c.height=Math.round(img.height*sc);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      res(c.toDataURL('image/jpeg',q||0.4));
    }; img.onerror=function(){res(url);}; img.src=url;
  });
}
function compressPhotos(photos) {
  var keys=Object.keys(photos||{}); var out={}; var chain=Promise.resolve();
  keys.forEach(function(k){
    chain=chain.then(function(){return photos[k]?compressImg(photos[k]):Promise.resolve(null);}).then(function(v){out[k]=v;});
  });
  return chain.then(function(){return out;});
}

var FB = {
  listen: function(cb) {
    if (!fbDb) return function(){};
    return fbDb.collection('vehicles').orderBy('createdAt','desc').onSnapshot(function(snap){
      cb(snap.docs.map(function(d){return Object.assign({},d.data(),{id:d.id});}));
    }, function(e){console.error('FS listen:',e);});
  },
  save: function(v) {
    if (!fbDb) return Promise.reject(new Error('Firestore unavailable'));
    var doc=Object.assign({},v); delete doc.id; delete doc.photos;
    if (doc.docs){var cd={};Object.keys(doc.docs).forEach(function(k){if(doc.docs[k])cd[k]=doc.docs[k];});doc.docs=cd;}
    doc.createdAt=firebase.firestore.FieldValue.serverTimestamp();
    return compressPhotos(v.photos||{}).then(function(cp){
      var fp={};Object.keys(cp).forEach(function(k){if(cp[k])fp[k]=cp[k];});
      doc.photos=fp;
      return fbDb.collection('vehicles').add(doc).then(function(ref){
        return ref.update({id:ref.id}).then(function(){return ref.id;});
      });
    });
  },
  update: function(id,u) {
    if (!fbDb) return Promise.reject(new Error('Firestore unavailable'));
    if (u.photos) {
      return compressPhotos(u.photos).then(function(cp){
        return fbDb.collection('vehicles').doc(id).update(Object.assign({},u,{photos:cp}));
      });
    }
    return fbDb.collection('vehicles').doc(id).update(u);
  },
  del: function(id) {
    if (!fbDb) return Promise.reject(new Error('Firestore unavailable'));
    return fbDb.collection('vehicles').doc(id).delete();
  }
};

// ── PRICE ALGORITHM (with challan + volume) ───────────────────────────────────
function calcAlgo(idv, purchaseVal, year, insExpired, accidental, claimHistory, odometer, engine, fuel, challanAmt, volumeCC) {
  var baseRaw = insExpired ? purchaseVal : idv;
  var base = parseFloat(baseRaw)||0;
  if (!base||base<1000||!year) return null;
  var age = new Date().getFullYear()-parseInt(year);
  if (age<0||age>30) return null;
  var price = base; var steps = [];

  if (insExpired) {
    steps.push({label:'Base: purchase value (no insurance)',val:price,type:'base'});
    var nip=price*0.10; price-=nip;
    steps.push({label:'No insurance penalty (10%)',val:-nip,type:'minus'});
  } else {
    steps.push({label:'Base IDV (current insured value)',val:price,type:'base'});
  }

  var depN=[0,0.05,0.10,0.15,0.20,0.25,0.30,0.38,0.46,0.52,0.58,0.63,0.67,0.70,0.73,0.76,0.78,0.80,0.82,0.84,0.86];
  var depE=[0,0.08,0.14,0.20,0.27,0.33,0.40,0.48,0.55,0.61,0.66,0.71,0.75,0.78,0.81,0.84,0.86,0.88,0.89,0.90,0.91];
  var depTable=insExpired?depE:depN;
  var depIdx=Math.min(Math.max(age,0),20);
  var dep=(depTable[depIdx]!==undefined)?depTable[depIdx]:0.86;
  var depAmt=price*dep; price-=depAmt;
  steps.push({label:'Age depreciation ('+age+'yr, '+Math.round(dep*100)+'%)',val:-depAmt,type:'minus'});

  // Engine volume premium: >2000cc diesel gets premium, <1000cc gets discount
  var vol = parseFloat(volumeCC)||0;
  if (vol > 0) {
    var volAdj = 0;
    if (vol > 2000 && fuel === 'Diesel') { volAdj = 0.04; }
    else if (vol > 1500) { volAdj = 0.02; }
    else if (vol < 1000) { volAdj = -0.02; }
    if (volAdj !== 0) {
      var vadj = price*volAdj; price+=vadj;
      steps.push({label:'Engine volume adj ('+vol+'cc)',val:vadj,type:volAdj>0?'plus':'minus'});
    }
  }

  if (odometer) {
    var odo=parseInt(odometer); var diff=odo-age*12000;
    if (diff>0){var pen=Math.min(diff*0.8,price*0.08);price-=pen;steps.push({label:'High odometer penalty',val:-pen,type:'minus'});}
    else if (diff<-5000){var bon=Math.min(Math.abs(diff)*0.3,price*0.04);price+=bon;steps.push({label:'Low odometer bonus',val:bon,type:'plus'});}
  }
  if (accidental==='Yes'){var ap=price*0.12;price-=ap;steps.push({label:'Accidental penalty (12%)',val:-ap,type:'minus'});}
  var clMap={'None':0,'1 Minor':0.04,'1 Major':0.10,'2+ Claims':0.15,'Unknown':0.06};
  var cp=clMap[claimHistory]||0;
  if (cp>0){var cpen=price*cp;price-=cpen;steps.push({label:'Claim history ('+claimHistory+')',val:-cpen,type:'minus'});}
  var engMap={'Excellent':0.03,'Good':0,'Fair':-0.05,'Poor':-0.12};
  var ea=engMap[engine]||0;
  if (ea!==0){var eadj=price*ea;price+=eadj;steps.push({label:'Engine condition ('+engine+')',val:eadj,type:ea>0?'plus':'minus'});}
  var fMap={'Diesel':0.03,'Electric':0.05,'Hybrid':0.04,'CNG':-0.02,'Petrol':0,'LPG':-0.03};
  var fa=fMap[fuel]||0;
  if (fa!==0){var fadj=price*fa;price+=fadj;steps.push({label:'Fuel type ('+fuel+')',val:fadj,type:fa>0?'plus':'minus'});}
  var margin=price*0.08;price-=margin;
  steps.push({label:'Dealer margin (8%)',val:-margin,type:'minus'});
  if (challanAmt&&parseFloat(challanAmt)>0){
    var chal=parseFloat(challanAmt);price-=chal;
    steps.push({label:'Pending challans (full deduction)',val:-chal,type:'minus'});
  }
  price=Math.max(price,10000);
  steps.push({label:'Recommended Purchase Price',val:price,type:'result'});
  return {price:Math.round(price),steps:steps};
}

function CameraCapture(props) {
  var label=props.label; var onCapture=props.onCapture; var captured=props.captured;

  function kill(){if(streamRef.current){streamRef.current.getTracks().forEach(function(t){t.stop();});streamRef.current=null;}if(videoRef.current)videoRef.current.srcObject=null;}
  function start(f){
    setErr(''); kill(); var t=f||'environment';
    var tries=[{video:{facingMode:{exact:t},width:{ideal:1280}}},{video:{facingMode:t}},{video:true}];
    var i=0;
    function next(){if(i>=tries.length){setErr('Camera unavailable');return;}
      navigator.mediaDevices.getUserMedia(tries[i++]).then(function(stream){
        streamRef.current=stream; setFacing(t); setOpen(true);
        requestAnimationFrame(function(){if(videoRef.current){videoRef.current.srcObject=stream;videoRef.current.play().catch(function(){});}});

    ctx.fillStyle='#f5a623'; ctx.font='bold '+Math.round(bh*0.5)+'px monospace';
    ctx.fillText('📍 '+ts+' | Utrust',8,c.height-Math.round(bh*0.18));
    var url=c.toDataURL('image/jpeg',0.88); stop(); onCapture(url);
  }
  useEffect(function(){return function(){kill();};},[]);

  return h('div',null,
    h('div',{className:'cam-slot'+(captured?' captured':''),onClick:function(){if(!captured)start('environment');}},

  var total=fv.length;
  var appr=fv.filter(function(v){return v.status==='approved';});
  var rejt=fv.filter(function(v){return v.status==='rejected';});
  var pend=fv.filter(function(v){return v.status==='pending'||v.status==='review';});
  var withAll=appr.filter(function(v){return v.price>0&&v.algo_price>0&&v.approved_price>0;});
  var avgEval=withAll.length?withAll.reduce(function(a,v){return a+v.price;},0)/withAll.length:0;
  var avgAlgo=withAll.length?withAll.reduce(function(a,v){return a+v.algo_price;},0)/withAll.length:0;
  var avgAppr=withAll.length?withAll.reduce(function(a,v){return a+v.approved_price;},0)/withAll.length:0;
  var evalMap={};
  fv.forEach(function(v){

  });

  var bStats=BRANCHES.map(function(b){var bv=vs.filter(function(v){return v.branch===b;});return{branch:b,total:bv.length,appr:bv.filter(function(v){return v.status==='approved';}).length,rejt:bv.filter(function(v){return v.status==='rejected';}).length};}).filter(function(b){return b.total>0;}).sort(function(a,b){return b.total-a.total;});

              h('div',{style:{fontSize:13,fontWeight:600}},u.name),

function App() {
  var _user=useState(null); var user=_user[0]; var setUser=_user[1];
  var _page=useState('dash'); var page=_page[0]; var setPage=_page[1];
  var _vehicles=useState(SAMPLE); var vehicles=_vehicles[0]; var setVehicles=_vehicles[1];
  var _sel=useState(null); var selVehicle=_sel[0]; var setSelVehicle=_sel[1];
  var _toast=useState(null); var toast=_toast[0]; var setToast=_toast[1];
  var _dbLive=useState(false); var dbLive=_dbLive[0]; var setDbLive=_dbLive[1];
  var _saving=useState(false); var saving=_saving[0]; var setSaving=_saving[1];

  function showToast(msg,type){setToast({msg:msg,type:type||'success'});}

  // Firestore listener
  useEffect(function(){
    if(!fbDb)return;
    var unsub=FB.listen(function(docs){
      setDbLive(true);
      if(docs.length>0){
        setVehicles(function(prev){
          var fsIds=docs.map(function(d){return d.id;});
          var localOnly=prev.filter(function(v){return v.id&&v.id.startsWith('V')&&!fsIds.includes(v.id);});
          return localOnly.concat(docs);
        });
      }
    });
    return function(){if(unsub)unsub();};
  },[]);

  var pendingCount=vehicles.filter(function(v){return v.status==='pending'||v.status==='review';}).length;

  function handleApprove(id,comment,approvedPrice){
    var u={status:'approved',approved:new Date().toISOString().slice(0,10),approved_price:approvedPrice,approval_comment:comment};
    setVehicles(function(vs){return vs.map(function(v){return v.id===id?Object.assign({},v,u):v;});});
    if(selVehicle&&selVehicle.id===id)setSelVehicle(function(v){return Object.assign({},v,u);});
    if(fbDb)FB.update(id,u).catch(function(e){console.error(e);});
    showToast('Approved! Price set.','success');
  }
  function handleReject(id,comment){
    var u={status:'rejected',rejection_comment:comment};
    setVehicles(function(vs){return vs.map(function(v){return v.id===id?Object.assign({},v,u):v;});});
    if(selVehicle&&selVehicle.id===id)setSelVehicle(function(v){return Object.assign({},v,u);});
    if(fbDb)FB.update(id,u).catch(function(e){console.error(e);});
    showToast('Inspection rejected','error');
  }
  function handleUpdatePrice(id,price){
    var u={approved_price:price};
    setVehicles(function(vs){return vs.map(function(v){return v.id===id?Object.assign({},v,u):v;});});
    if(selVehicle&&selVehicle.id===id)setSelVehicle(function(v){return Object.assign({},v,u);});
    if(fbDb)FB.update(id,u).catch(function(e){console.error(e);});
    showToast('Price updated','success');
  }
  function handleDelete(id){
    setVehicles(function(vs){return vs.filter(function(v){return v.id!==id;});});
    if(fbDb)FB.del(id).catch(function(e){console.error(e);});
    showToast('Deleted','info');
  }
  function handleNewVehicle(vehicle){
    setSaving(true);
    showToast('Saving...','info');
    setVehicles(function(vs){return [vehicle].concat(vs);});
    setPage('vehicles');
    if(fbDb){
      FB.save(vehicle).then(function(newId){
        setVehicles(function(vs){return vs.map(function(v){return v.id===vehicle.id?Object.assign({},v,{id:newId}):v;});});
        setSaving(false);
        showToast(vehicle.status==='draft'?'✓ Draft saved!':'✓ Submitted for Incharge approval!','success');
      }).catch(function(err){
        setSaving(false);
        var msg=err&&err.message?err.message:'';
        if(msg.includes('permission')||msg.includes('PERMISSION_DENIED')){showToast('Firestore rules error — set allow read, write: if true in Firebase Console','error');}
        else{showToast('Save issue: '+(msg||'check connection'),'error');}
      });
    } else {
      setSaving(false);
      showToast(vehicle.status==='draft'?'✓ Draft saved!':'✓ Submitted!','success');
    }
  }

  var titles={dash:'Dashboard',vehicles:user&&user.role==='officer'?'My Inspections':'All Vehicles',add:'New Inspection',approval:'Pending Approvals',mis:'MIS Dashboard',users:'Employee Database',detail:'Vehicle Detail'};

  if(!user) return h(Login,{onLogin:function(u){setUser(u);setPage('dash');}});

  function renderPage(){
    if(page==='dash') return h(Dashboard,{vehicles:vehicles,user:user,setPage:setPage});
    if(page==='vehicles') return h(VehiclesList,{vehicles:vehicles,user:user,setPage:setPage,setSelectedVehicle:setSelVehicle,onAddNew:function(){setPage('add');},onDelete:handleDelete});
    if(page==='add') return h(NewInspection,{user:user,onSubmit:handleNewVehicle,onCancel:function(){setPage('vehicles');},showToast:showToast});
    if(page==='approval') return h(Approvals,{vehicles:vehicles,user:user,onApprove:handleApprove,onReject:handleReject,setPage:setPage,setSelectedVehicle:setSelVehicle});
    if(page==='mis') return h(MIS,{vehicles:vehicles,user:user});
    if(page==='users') return h(EmployeeDB,{vehicles:vehicles,showToast:showToast});
    if(page==='detail') return h(VehicleDetail,{vehicle:selVehicle,user:user,onBack:function(){setPage('vehicles');},onApprove:handleApprove,onReject:handleReject,onUpdatePrice:handleUpdatePrice});
    return h(Dashboard,{vehicles:vehicles,user:user,setPage:setPage});
  }

  return h('div',{style:{display:'flex',minHeight:'100vh',width:'100%'}},
    h(Sidebar,{user:user,page:page,setPage:setPage,onLogout:function(){setUser(null);setPage('dash');},pendingCount:pendingCount}),
    h('div',{className:'main'},
      h('div',{className:'topbar'},
        h('div',null,
          h('div',{className:'tb-title'},titles[page]||'Utrust'),
          h('div',{className:'tb-sub'},'Utrust Vehicle Management · '+user.branch)
        ),
        h('div',{style:{display:'flex',gap:8,alignItems:'center'}},
          h('div',{style:{display:'flex',alignItems:'center',gap:5,fontSize:10,fontFamily:'monospace',padding:'3px 8px',borderRadius:4,background:dbLive?'var(--gdim)':'var(--sur2)',border:'1px solid '+(dbLive?'rgba(34,197,94,0.3)':'var(--bdr)'),color:dbLive?'var(--grn)':'var(--tx3)'}},
            h('div',{className:'db-dot',style:{background:dbLive?'var(--grn)':'var(--tx3)'}}),
            saving?'Saving...':dbLive?'Cloud Live':'Local'
          ),
          page!=='add'&&(user.role==='officer'||user.role==='admin')&&h('button',{className:'btn btn-acc btn-sm',onClick:function(){setPage('add');}},'➕ New')
        )
      ),
      h('div',{className:'content'},renderPage())
    ),
    toast&&h(Toast,{message:toast.msg,type:toast.type,onClose:function(){setToast(null);}})
  );
}

function initApp(){
  if(!window.React||!window.ReactDOM){
    console.error('React not loaded');
    document.getElementById('root').innerHTML='<div style="color:white;padding:60px;text-align:center;font-family:sans-serif;min-height:100vh;background:#0a0b0d;display:flex;flex-direction:column;align-items:center;justify-content:center"><h2>⚠️ Loading Error</h2><p style="color:#888;margin-top:8px">Please check your internet connection and reload.</p><button onclick="location.reload()" style="margin-top:20px;padding:12px 24px;background:#f5a623;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer">Reload</button></div>';
    return;
  }
  ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
}

// Init - React should already be loaded by this point
if(window.React&&window.ReactDOM){
  initApp();
} else {
  window.addEventListener('load',function(){
    setTimeout(initApp, 100);
  });
}
</script>
</body>
</html>
