  var [tab, setTab] = useState('overview');
  var [branchF, setBranchF] = useState('all');
  var BRANCHES = ['Purnea','Bhagalpur','Forbesganj','Kishanganj','Katihar','Banka','Khagaria','Saharsa','Supaul'];
  var fv = branchF === 'all' ? vehicles : vehicles.filter(function(v){return v.branch===branchF;});
  var total = fv.length;
  var appr = fv.filter(function(v){return v.status==='approved';});
  var rejt = fv.filter(function(v){return v.status==='rejected';});
  var pend = fv.filter(function(v){return v.status==='pending'||v.status==='review';});

  var withAll = appr.filter(function(v){return v.price>0&&v.algo_price>0&&v.approved_price>0;});
  var avgEval = withAll.length ? withAll.reduce(function(a,v){return a+v.price;},0)/withAll.length : 0;
  var avgAlgo = withAll.length ? withAll.reduce(function(a,v){return a+v.algo_price;},0)/withAll.length : 0;
  var avgAppr = withAll.length ? withAll.reduce(function(a,v){return a+v.approved_price;},0)/withAll.length : 0;

  var evalMap = {};
  fv.forEach(function(v) {
    if (!v.officer) return;
    if (!evalMap[v.officer]) evalMap[v.officer] = {name:v.officer,branch:v.branch,total:0,appr:0,rejt:0,evalSum:0,algoSum:0,cnt:0};
    var e = evalMap[v.officer];
    e.total++;
    if (v.status==='approved') e.appr++;
    if (v.status==='rejected') e.rejt++;
    if (v.price>0&&v.algo_price>0){e.evalSum+=v.price;e.algoSum+=v.algo_price;e.cnt++;}
  });
  var evalList = Object.values(evalMap).sort(function(a,b){return b.total-a.total;});

  var branchStats = BRANCHES.map(function(b) {
    var bv = vehicles.filter(function(v){return v.branch===b;});
    return {branch:b,total:bv.length,appr:bv.filter(function(v){return v.status==='approved';}).length,rejt:bv.filter(function(v){return v.status==='rejected';}).length};
  }).filter(function(b){return b.total>0;}).sort(function(a,b){return b.total-a.total;});
  var maxB = branchStats.reduce(function(m,b){return Math.max(m,b.total);},1);

  return (
    <div>
      <div style={{display:'flex',gap:10,marginBottom:18,flexWrap:'wrap',alignItems:'center'}}>
        <div style={{fontFamily:'Syne,sans-serif',fontSize:16,fontWeight:700,flex:1}}>MIS Dashboard</div>
        <select style={{background:'var(--sur2)',border:'1px solid var(--bdr)',borderRadius:'var(--r)',padding:'7px 11px',color:'var(--txt)',fontSize:13,outline:'none'}} value={branchF} onChange={function(e){setBranchF(e.target.value);}}>
          <option value="all">All Branches</option>
          {BRANCHES.map(function(b){return <option key={b}>{b}</option>;})}
        </select>
      </div>
      <div className="tabs">
        {[['overview','📊 Overview'],['evaluators','👥 Evaluators'],['pricing','💰 Price Analysis'],['branches','🗺 Branches']].map(function(t) {
          return <div key={t[0]} className={'tab'+(tab===t[0]?' active':'')} onClick={function(){setTab(t[0]);}}>{t[1]}</div>;
        })}
      </div>

      {tab === 'overview' && (
        <div>
          <div className="sg" style={{marginBottom:20}}>
            {[{l:'Total',v:total,i:'🚗'},{l:'Approved',v:appr.length,i:'✅',s:total?Math.round(appr.length/total*100)+'%':'-'},{l:'Rejected',v:rejt.length,i:'❌',s:total?Math.round(rejt.length/total*100)+'%':'-'},{l:'Pending',v:pend.length,i:'⏳'}].map(function(s,i) {
              return <div key={i} className="sc"><div className="sc-lbl">{s.l}</div><div className="sc-val">{s.v}</div>{s.s&&<div className="sc-sub">{s.s}</div>}<div className="sc-ico">{s.i}</div></div>;
            })}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
            <div className="card" style={{padding:18}}>
              <div style={{fontFamily:'Syne,sans-serif',fontSize:14,fontWeight:700,marginBottom:16}}>Branch Activity</div>
              <div className="bar-chart">
                {branchStats.map(function(b) { return <BarRow key={b.branch} label={b.branch} val={b.total} max={maxB} sub={b.appr+' approved'}  wide={true} />; })}
              </div>
            </div>
            <div className="card" style={{padding:18}}>
              <div style={{fontFamily:'Syne,sans-serif',fontSize:14,fontWeight:700,marginBottom:16}}>Status Split</div>
              <div className="bar-chart">
                {[{l:'Approved',v:appr.length,c:'var(--grn)'},{l:'Rejected',v:rejt.length,c:'var(--red)'},{l:'Pending',v:fv.filter(function(v){return v.status==='pending';}).length,c:'var(--acc)'},{l:'Draft',v:fv.filter(function(v){return v.status==='draft';}).length,c:'var(--tx3)'}].map(function(b) {
                  return <BarRow key={b.l} label={b.l} val={b.v} max={total||1} color={b.c} />;
                })}
              </div>
            </div>
          </div>
        </div>
      )}

      {tab === 'evaluators' && (
        <div>
          <div className="card" style={{overflowX:'auto'}}>
            <table className="mis-table">
              <thead>
                <tr><th>Evaluator</th><th>Branch</th><th>Total</th><th>Approved</th><th>Rejected</th><th>Rate</th><th>Price Trend</th></tr>
              </thead>
              <tbody>
                {evalList.length === 0 && <tr><td colSpan={7} style={{textAlign:'center',padding:36,color:'var(--tx3)'}}>No data yet</td></tr>}
                {evalList.map(function(e) {
                  var rate = e.total ? Math.round(e.appr/e.total*100) : 0;
                  var avgEP = e.cnt ? e.evalSum/e.cnt : 0;
                  var avgAP = e.cnt ? e.algoSum/e.cnt : 0;
                  var trend = avgEP && avgAP ? ((avgEP-avgAP)/avgAP*100) : null;
                  return (
                    <tr key={e.name}>
                      <td style={{fontWeight:600}}>{e.name}</td>
                      <td><span className="btag">{e.branch}</span></td>
                      <td style={{fontFamily:'DM Mono,monospace',fontWeight:700,textAlign:'center'}}>{e.total}</td>
                      <td style={{color:'var(--grn)',fontFamily:'DM Mono,monospace',fontWeight:700,textAlign:'center'}}>{e.appr}</td>
                      <td style={{color:'var(--red)',fontFamily:'DM Mono,monospace',fontWeight:700,textAlign:'center'}}>{e.rejt}</td>
                      <td style={{textAlign:'center',fontWeight:700,color:rate>=70?'var(--grn)':rate>=50?'var(--acc)':'var(--red)'}}>{rate}%</td>
                      <td style={{textAlign:'center',fontSize:11,fontWeight:600,color:trend===null?'var(--tx3)':Math.abs(trend)<=5?'var(--grn)':Math.abs(trend)<=15?'var(--acc)':'var(--red)'}}>
                        {trend !== null ? ((trend>0?'▲':'▼')+Math.abs(trend).toFixed(1)+'% vs algo') : '—'}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          <div style={{marginTop:10,padding:'8px 12px',background:'var(--sur2)',borderRadius:'var(--r)',fontSize:11,color:'var(--tx3)'}}>
            ▲ = evaluator quotes higher than algorithm · ▼ = lower · Green = within ±5%
          </div>
        </div>
      )}

      {tab === 'pricing' && (
        <div>
          <div className="sg" style={{marginBottom:16}}>
            {[{l:'Avg Evaluator',v:fmtL(avgEval),i:'🧑'},{l:'Avg Algorithm',v:fmtL(avgAlgo),i:'🧮'},{l:'Avg Approved',v:fmtL(avgAppr),i:'✅'},{l:'Records',v:withAll.length,i:'📊'}].map(function(s,i) {
              return <div key={i} className="sc"><div className="sc-lbl">{s.l}</div><div className="sc-val" style={{fontSize:18}}>{s.v}</div><div className="sc-ico">{s.i}</div></div>;
            })}
          </div>
          {withAll.length > 0 ? (
            <div className="card" style={{overflowX:'auto'}}>
              <table className="mis-table">
                <thead><tr><th>Vehicle</th><th>Evaluator Price</th><th>Algorithm</th><th>Approved</th><th>Eval Variance</th></tr></thead>
                <tbody>
                  {withAll.slice(0,20).map(function(v) {
                    var varPct = ((v.price - v.algo_price) / v.algo_price * 100);
                    var varAbs = Math.abs(varPct);
                    var varColor = varAbs <= 5 ? 'var(--grn)' : varAbs <= 15 ? 'var(--acc)' : 'var(--red)';
                    return (
                      <tr key={v.id}>
                        <td><div style={{fontWeight:600}}>{v.brand} {v.model}</div><div style={{fontSize:10,color:'var(--tx3)',fontFamily:'DM Mono,monospace'}}>{v.reg} · {v.branch}</div></td>
                        <td style={{fontFamily:'DM Mono,monospace',textAlign:'right'}}>{fmtL(v.price)}</td>
                        <td style={{fontFamily:'DM Mono,monospace',textAlign:'right',color:'var(--tx3)'}}>{fmtL(v.algo_price)}</td>
                        <td style={{fontFamily:'DM Mono,monospace',textAlign:'right',color:'var(--grn)',fontWeight:700}}>{fmtL(v.approved_price)}</td>
                        <td style={{textAlign:'right',fontWeight:700,fontSize:12,color:varColor}}>{varPct>0?'+':''}{varPct.toFixed(1)}%</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          ) : (
            <div style={{textAlign:'center',padding:40,color:'var(--tx3)'}}>
              <div style={{fontSize:32,marginBottom:12}}>📊</div>
              <div style={{fontFamily:'Syne,sans-serif',fontSize:16,fontWeight:700,color:'var(--tx2)'}}>No price data yet</div>
              <div style={{fontSize:13,marginTop:6}}>Appears once inspections are approved with all 3 prices</div>
            </div>
          )}
        </div>
      )}

      {tab === 'branches' && (
        <div>
          {branchStats.map(function(b) {
            var bv = vehicles.filter(function(v){return v.branch===b.branch;});
            var avgP = b.appr > 0 ? bv.filter(function(v){return v.status==='approved';}).reduce(function(a,v){return a+v.price;},0)/b.appr : 0;
            var rate = b.total ? Math.round(b.appr/b.total*100) : 0;
            return (
              <div key={b.branch} style={{background:'var(--sur)',border:'1px solid var(--bdr)',borderRadius:'var(--r2)',padding:'16px',marginBottom:12}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10,marginBottom:12}}>
                  <div>
                    <div style={{fontFamily:'Syne,sans-serif',fontSize:15,fontWeight:700}}>📍 {b.branch}</div>
                    <div style={{fontSize:11,color:'var(--tx3)',marginTop:2}}>{b.total} inspections</div>
                  </div>
                  <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
                    {[['Total',b.total,'var(--txt)'],['Approved',b.appr,'var(--grn)'],['Rejected',b.rejt,'var(--red)'],['Rate',rate+'%','var(--acc)'],['Avg',fmtL(avgP),'var(--blu)']].map(function(item) {
                      return (
                        <div key={item[0]} style={{textAlign:'center'}}>
                          <div style={{fontFamily:'Syne,sans-serif',fontSize:17,fontWeight:800,color:item[2]}}>{item[1]}</div>
                          <div style={{fontSize:9,color:'var(--tx3)',fontFamily:'DM Mono,monospace',textTransform:'uppercase',letterSpacing:'0.06em'}}>{item[0]}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
                <div style={{background:'var(--sur2)',borderRadius:4,overflow:'hidden',height:7,display:'flex',gap:1}}>
                  {[['approved','var(--grn)'],['rejected','var(--red)'],['pending','var(--acc)'],['draft','var(--tx3)']].map(function(pair) {
                    var cnt = bv.filter(function(v){return v.status===pair[0];}).length;
                    var pct = b.total ? cnt/b.total*100 : 0;
                    return pct > 0 ? <div key={pair[0]} style={{width:pct+'%',background:pair[1],height:'100%'}} title={pair[0]+': '+cnt} /> : null;
                  })}
                </div>
              </div>
            );
          })}
          {branchStats.length === 0 && <div style={{textAlign:'center',padding:40,color:'var(--tx3)'}}>No branch data available</div>}
        </div>
      )}
    </div>
  );
}

// ── EMPLOYEE DB ───────────────────────────────────────────
function EmployeeDB(props) {
  var vehicles = props.vehicles; var showToast = props.showToast;
  var [users, setUsers] = useState(function(){return [...CRED_LIST];});
  var [modal, setModal] = useState(null);
  var [editing, setEditing] = useState(null);
  var [showPwd, setShowPwd] = useState({});
  var [search, setSearch] = useState('');
  var [branchF, setBranchF] = useState('all');
  var [form, setForm] = useState({name:'',username:'',password:'Utrust@2025',role:'officer',branch:'Purnea',email:'',phone:''});
  var BRANCHES = ['Purnea','Bhagalpur','Forbesganj','Kishanganj','Katihar','Banka','Khagaria','Saharsa','Supaul','HQ','All Branches'];

  function persist(list) { saveCreds(list); setUsers([...list]); }

  function openAdd() { setForm({name:'',username:'',password:'Utrust@2025',role:'officer',branch:'Purnea',email:'',phone:''}); setEditing(null); setModal('form'); }
  function openEdit(u) { setForm(Object.assign({},u)); setEditing(u.id); setModal('form'); }

  function save() {
    var f = form;
    if (!f.name.trim()||!f.username.trim()||!f.password.trim()) { showToast('Name, username and password required','error'); return; }
    var dup = users.find(function(u){return u.username===f.username.trim()&&u.id!==editing;});
    if (dup) { showToast('Username "'+f.username+'" already exists','error'); return; }
    var clean = Object.assign({},f,{username:f.username.trim().toLowerCase(),name:f.name.trim(),avatar:f.name.trim().split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase()});
    var newList;
    if (editing) { newList = users.map(function(u){return u.id===editing?Object.assign({},u,clean):u;}); showToast(clean.name+' updated','success'); }
    else { newList = users.concat([Object.assign({},clean,{id:'U'+Date.now()})]); showToast(clean.name+' added — login: '+clean.username,'success'); }
    persist(newList); setModal(null);
  }

  function del(id) {
    if (id==='U001') { showToast('Cannot delete admin','error'); return; }
    var u = users.find(function(x){return x.id===id;});
    if (!window.confirm('Remove '+u.name+'?')) return;
    persist(users.filter(function(x){return x.id!==id;}));
    showToast(u.name+' removed','info');
  }

  function setF(k,v) { setForm(function(p){return Object.assign({},p,{[k]:v});}); }

  var filtered = users.filter(function(u) {
    var q = search.toLowerCase();
    var ms = !q||u.name.toLowerCase().includes(q)||u.username.toLowerCase().includes(q)||(u.phone||'').includes(q);
    var mb = branchF==='all'||u.branch===branchF;
    return ms && mb;
  });

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:8}}>
        <div style={{color:'var(--tx3)',fontSize:13}}>{users.length} employees</div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-ghost btn-sm" style={{fontSize:11}} onClick={function(){persist([...DEFAULT_CREDS]);showToast('Reset to default team','info');}}>↺ Reset</button>
          <button className="btn btn-acc btn-sm" onClick={openAdd}>➕ Add</button>
        </div>
      </div>
      <div style={{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap'}}>
        <div className="search-bar" style={{flex:1,minWidth:180}}>
          <span>🔍</span>
          <input placeholder="Search name, username, phone..." value={search} onChange={function(e){setSearch(e.target.value);}} />
        </div>
        <select style={{background:'var(--sur2)',border:'1px solid var(--bdr)',borderRadius:'var(--r)',padding:'7px 11px',color:'var(--txt)',fontSize:13,outline:'none'}} value={branchF} onChange={function(e){setBranchF(e.target.value);}}>
          <option value="all">All Branches</option>
          {BRANCHES.map(function(b){return <option key={b}>{b}</option>;})}
        </select>
      </div>
      {['admin','leader','officer'].map(function(role) {
        var roleUsers = filtered.filter(function(u){return u.role===role;});
        if (!roleUsers.length) return null;
        var roleLabel = {admin:'Admin',leader:'Utrust Incharge',officer:'Evaluator'};
        var roleColor = {admin:'168,85,247',leader:'59,130,246',officer:'34,197,94'};
        return (
          <div key={role} style={{marginBottom:22}}>
            <div style={{fontSize:10,fontWeight:700,color:'var(--tx3)',fontFamily:'DM Mono,monospace',letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:8,paddingBottom:6,borderBottom:'1px solid var(--bdr)'}}>{roleLabel[role]} ({roleUsers.length})</div>
            {roleUsers.map(function(u) {
              var uv = vehicles.filter(function(v){return v.officerId===u.id;});
              return (
                <div key={u.id} className="user-card">
                  <div className={'av '+u.role} style={{width:38,height:38,fontSize:13,flexShrink:0}}>{u.avatar}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600}}>{u.name}</div>
                    <div style={{display:'flex',gap:7,flexWrap:'wrap',marginTop:3}}>
                      <span style={{fontFamily:'DM Mono,monospace',fontSize:11,color:'var(--acc)'}}>{u.username}</span>
                      {u.phone && <span style={{fontSize:11,color:'var(--tx3)'}}>📞 {u.phone}</span>}
                      {u.branch && <span className="btag">📍 {u.branch}</span>}
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:5,marginTop:4}}>
                      <span style={{fontSize:10,color:'var(--tx3)'}}>pwd:</span>
                      <span style={{fontFamily:'DM Mono,monospace',fontSize:11,color:showPwd[u.id]?'var(--txt)':'var(--bdr2)'}}>
                        {showPwd[u.id] ? u.password : '●●●●●●●●'}
                      </span>
                      <button style={{background:'none',border:'none',cursor:'pointer',fontSize:13,padding:'0 2px'}} onClick={function(){setShowPwd(function(p){var n=Object.assign({},p);n[u.id]=!n[u.id];return n;});}}>
                        {showPwd[u.id] ? '🙈' : '👁'}
                      </button>
                    </div>
                  </div>
                  <span style={{background:'rgba('+roleColor[role]+',0.15)',color:'rgb('+roleColor[role]+')',border:'1px solid rgba('+roleColor[role]+',0.3)',fontSize:10,padding:'2px 8px',borderRadius:20,fontFamily:'DM Mono,monospace',flexShrink:0}}>{roleLabel[role].toUpperCase()}</span>
                  {u.role === 'officer' && (
                    <div style={{display:'flex',gap:14,flexShrink:0}}>
                      {[['Done',uv.length],['OK',uv.filter(function(v){return v.status==='approved';}).length]].map(function(s) {
                        return <div key={s[0]} style={{textAlign:'center'}}><div style={{fontFamily:'Syne,sans-serif',fontSize:15,fontWeight:800}}>{s[1]}</div><div style={{fontSize:9,color:'var(--tx3)',fontFamily:'DM Mono,monospace',textTransform:'uppercase'}}>{s[0]}</div></div>;
                      })}
                    </div>
                  )}
                  <div style={{display:'flex',gap:6,flexShrink:0}}>
                    <button className="btn btn-ghost btn-sm" onClick={function(){openEdit(u);}}>✏️</button>
                    {u.id !== 'U001' && <button className="btn btn-danger btn-sm" onClick={function(){del(u.id);}}>🗑</button>}
                  </div>
                </div>
              );
            })}
          </div>
        );
      })}
      {modal === 'form' && (
        <Modal title={editing?'Edit Employee':'Add Employee'} sub="Changes take effect immediately" onClose={function(){setModal(null);}}>
          <div className="fg">
            <div className="field s2"><label>Full Name *</label><input value={form.name} onChange={function(e){setF('name',e.target.value);}} placeholder="Employee full name" /></div>
            <div className="field"><label>Username * <span style={{color:'var(--tx3)',fontSize:10,fontWeight:400}}>(login ID)</span></label><input value={form.username} onChange={function(e){setF('username',e.target.value.toLowerCase());}} placeholder="e.g. ravi.purnea" /></div>
            <div className="field"><label>Password *</label><input value={form.password} onChange={function(e){setF('password',e.target.value);}} placeholder="Min 8 chars" /></div>
            <div className="field"><label>Role</label>
              <select value={form.role} onChange={function(e){setF('role',e.target.value);}}>
                <option value="officer">Evaluator</option>
                <option value="leader">Utrust Incharge</option>
                <option value="admin">Admin</option>
              </select>
            </div>
            <div className="field"><label>Branch</label>
              <select value={form.branch} onChange={function(e){setF('branch',e.target.value);}}>
                {BRANCHES.map(function(b){return <option key={b}>{b}</option>;})}
              </select>
            </div>
            <div className="field"><label>Phone</label><input value={form.phone} onChange={function(e){setF('phone',e.target.value);}} placeholder="10-digit number" /></div>
            <div className="field"><label>Email</label><input value={form.email} onChange={function(e){setF('email',e.target.value);}} placeholder="email@utrust.in" /></div>
          </div>
          <div className="modal-acts">
            <button className="btn btn-ghost" onClick={function(){setModal(null);}}>Cancel</button>
            <button className="btn btn-acc" onClick={save}>{editing?'Save Changes':'Add Employee'}</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── PDF GENERATORS ────────────────────────────────────────
// ── VENDOR PDF — full details, NO pricing ────────────────
function generateVendorPDF(vehicle) {
  var pm = vehicle.photos || {};
  var photoKeys = ['front','rear','left','right','interior1','interior2','engine','chassis'];
  var pLabels = {front:'FRONT VIEW',rear:'REAR VIEW',left:'LEFT SIDE',right:'RIGHT SIDE',interior1:'INTERIOR — DASHBOARD',interior2:'INTERIOR — REAR',engine:'ENGINE BAY',chassis:'CHASSIS / VIN'};

  var photosHtml = photoKeys.map(function(k) {
    return pm[k]
      ? '<div><div style="aspect-ratio:4/3;border-radius:7px;overflow:hidden;border:1px solid #e0e0e0"><img src="'+pm[k]+'" style="width:100%;height:100%;object-fit:cover"/></div><div style="font-size:9px;text-align:center;margin-top:4px;color:#555;font-family:monospace;letter-spacing:0.05em">'+pLabels[k]+'</div></div>'
      : '<div><div style="aspect-ratio:4/3;background:#f5f5f5;border-radius:7px;border:1px dashed #ccc;display:flex;align-items:center;justify-content:center"><span style="font-size:28px;opacity:0.3">📷</span></div><div style="font-size:9px;text-align:center;margin-top:4px;color:#bbb;font-family:monospace">'+pLabels[k]+'</div></div>';
  }).join('');

  var condRows = [
    ['Engine Condition',vehicle.engine],
    ['Tyres',vehicle.tyres],
    ['Battery',vehicle.battery],
    ['Electricals',vehicle.electricals],
    ['Accidental History',vehicle.accidental],
    ['Flood Damage',vehicle.flood]
  ].map(function(pair) {
    var good = pair[1]==='Excellent'||pair[1]==='Good'||pair[1]==='No';

function generateInternalPDF(vehicle, algo) {
  var pm = vehicle.photos || {};
  var photoKeys = ['front','rear','left','right','interior1','interior2','engine','chassis'];
  var pLabels = {front:'FRONT',rear:'REAR',left:'LEFT',right:'RIGHT',interior1:'INTERIOR 1',interior2:'INTERIOR 2',engine:'ENGINE',chassis:'CHASSIS/VIN'};
  var photosHtml = photoKeys.map(function(k) {
    return pm[k]
      ? '<div><div style="aspect-ratio:4/3;border-radius:6px;overflow:hidden;border:1px solid #e0e0e0"><img src="'+pm[k]+'" style="width:100%;height:100%;object-fit:cover"/></div><div style="font-size:9px;text-align:center;margin-top:3px;color:#22c55e;font-weight:700">'+pLabels[k]+' \u2713</div></div>'
      : '<div><div style="aspect-ratio:4/3;background:#f5f5f5;border-radius:6px;border:1px dashed #ccc;display:flex;align-items:center;justify-content:center;font-size:18px">\uD83D\uDCF7</div><div style="font-size:9px;text-align:center;margin-top:3px;color:#aaa">'+pLabels[k]+'</div></div>';
  }).join('');
  var algoHtml = algo ? algo.steps.map(function(s) {
    var c = s.type==='result'?'#f5a623':s.type==='minus'?'#ef4444':'#22c55e';
    var v = s.type==='base'?'\u20B9'+Math.round(s.val).toLocaleString('en-IN'):s.type==='result'?'\u20B9'+(s.val/100000).toFixed(2)+'L':(s.val>=0?'+':'')+'\u20B9'+Math.abs(Math.round(s.val)).toLocaleString('en-IN');
    return '<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #eee;font-size:11px"><span style="color:#666">'+s.label+'</span><span style="font-family:monospace;font-weight:600;color:'+c+'">'+v+'</span></div>';
  }).join('') : '';
  var w = window.open('','_blank');
  w.document.write('<!DOCTYPE html><html><head><title>Utrust Internal \u2014 '+vehicle.reg+'</title><meta charset="UTF-8"><style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:Arial,sans-serif;color:#111;font-size:13px;}.hdr{background:#0a0b0d;color:#fff;padding:22px 32px;display:flex;justify-content:space-between;align-items:center;}.body{padding:28px 32px;}.sec-ttl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#888;border-bottom:2px solid #f5a623;padding-bottom:6px;margin:20px 0 12px;}.photos{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}.price-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;background:#0a0b0d;padding:18px;border-radius:12px;margin:18px 0;text-align:center;}.price-item .lbl{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;}.price-item .val{font-size:20px;font-weight:900;}.cond-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #eee;font-size:12px;}@media print{button{display:none!important;}}</style></head><body><div class="hdr"><div><div style="font-size:18px;font-weight:900">\uD83D\uDE97 Utrust \u2014 INTERNAL REPORT</div><div style="font-size:10px;color:#888;margin-top:2px">Confidential \u00B7 Not for customer</div></div><div style="text-align:right"><div style="font-family:monospace;font-size:18px;color:#f5a623;font-weight:700">'+vehicle.reg+'</div><span style="display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:'+(vehicle.status==='approved'?'#22c55e':vehicle.status==='rejected'?'#ef4444':'#f5a623')+';color:'+(vehicle.status==='approved'||vehicle.status==='rejected'?'#fff':'#000')+';margin-top:5px">'+vehicle.status.toUpperCase()+'</span></div></div><div class="body"><div style="font-size:22px;font-weight:900;margin-bottom:3px">'+vehicle.brand+' '+vehicle.model+' '+vehicle.variant+'</div><div style="color:#666;margin-bottom:4px">'+vehicle.year+' \u00B7 '+vehicle.fuel+' \u00B7 '+vehicle.transmission+' \u00B7 '+(vehicle.ownership||'')+' Owner</div><div style="font-size:12px;color:#888">Evaluator: '+vehicle.officer+' \u00B7 '+vehicle.branch+' \u00B7 Submitted: '+vehicle.submitted+'</div><div class="sec-ttl">Price Comparison</div><div class="price-row"><div class="price-item"><div class="lbl">Evaluator Estimate</div><div class="val" style="color:#f5a623">\u20B9'+(vehicle.price/100000).toFixed(2)+'L</div><div style="font-size:10px;color:#888;margin-top:3px">'+vehicle.officer+'</div></div><div class="price-item"><div class="lbl">Algorithm Suggested</div><div class="val" style="color:#9aa3b8">\u20B9'+((vehicle.algo_price||0)/100000).toFixed(2)+'L</div><div style="font-size:10px;color:#888;margin-top:3px">'+(vehicle.price&&vehicle.algo_price?((vehicle.price-vehicle.algo_price)/vehicle.algo_price*100).toFixed(1)+'% diff':'—')+'</div></div><div class="price-item"><div class="lbl">Incharge Approved</div><div class="val" style="color:'+(vehicle.approved_price?'#22c55e':'#f5a623')+'">'+((vehicle.approved_price||0)>0?'\u20B9'+(vehicle.approved_price/100000).toFixed(2)+'L':'Pending')+'</div></div></div>'+(algo?'<div class="sec-ttl">Algorithm Breakdown</div>'+algoHtml:'')+'<div class="sec-ttl">Photos</div><div class="photos">'+photosHtml+'</div><div class="sec-ttl">Condition</div>'+[['Engine',vehicle.engine],['Tyres',vehicle.tyres],['Battery',vehicle.battery],['Electricals',vehicle.electricals],['Accidental',vehicle.accidental],['Flood',vehicle.flood],['Rating',vehicle.rating+'/10'],['Challans',vehicle.challan_verified?(vehicle.challan_amount>0?'⚠ ₹'+Number(vehicle.challan_amount).toLocaleString('en-IN'):'Has Challans'):'No Challans']].map(function(p){var c=(p[1]==='Excellent'||p[1]==='Good'||p[1]==='No')?'#22c55e':(p[1]==='Yes'||p[1]==='Poor'||p[1]==='Worn'||p[1]==='Dead'||p[1]==='Issues')?'#ef4444':'#d97706';return '<div class="cond-row"><span>'+p[0]+'</span><span style="font-weight:700;color:'+c+'">'+p[1]+'</span></div>';}).join('')+(vehicle.remarks?'<div style="margin-top:10px;padding:10px;background:#fffbf0;border-left:4px solid #f5a623;border-radius:0 6px 6px 0;font-size:12px"><b>Remarks:</b> '+vehicle.remarks+'</div>':'')+'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-top:36px"><div style="border-top:2px solid #333;padding-top:8px;font-size:11px;color:#666">Evaluator<br/><b>'+vehicle.officer+'</b></div><div style="border-top:2px solid #333;padding-top:8px;font-size:11px;color:#666">Incharge Approval<br/><b>'+(vehicle.approved_price?'Approved':'Pending')+'</b></div><div style="border-top:2px solid #333;padding-top:8px;font-size:11px;color:#666">Dealer Stamp</div></div></div><div style="background:#f8f9fa;padding:12px 32px;text-align:center;font-size:10px;color:#888;border-top:1px solid #eee;margin-top:20px">Utrust Internal \u00B7 CONFIDENTIAL \u00B7 '+new Date().toLocaleString('en-IN')+'</div><div style="text-align:center;padding:14px"><button onclick="window.print()" style="padding:10px 24px;background:#f5a623;border:none;border-radius:6px;font-weight:700;cursor:pointer;font-size:13px">\uD83D\uDDB8 Print / Save PDF</button></div></body></html>');
  w.document.close();
}

// ── APP ROOT ──────────────────────────────────────────────
function App() {
  var [user, setUser] = useState(null);
  var [page, setPage] = useState('dash');
  var [vehicles, setVehicles] = useState(SAMPLE_VEHICLES);
  var [selVehicle, setSelVehicle] = useState(null);
  var [toast, setToast] = useState(null);
  var [fbReady, setFbReady] = useState(!!window.FB_READY);
  var [dbLive, setDbLive] = useState(false);
  var [saving, setSaving] = useState(false);

  function showToast(msg, type) { setToast({msg:msg, type:type||'success'}); }

  useEffect(function() {
    if (window.FB_READY) { setFbReady(true); return; }
    var h = function() { setFbReady(true); };
    window.addEventListener('fb-ready', h);
    return function() { window.removeEventListener('fb-ready', h); };
  }, []);

  useEffect(function() {
    if (!fbReady) return;
    var unsub;
    try {
      unsub = window.FB.fbListenVehicles(function(docs) {
        setDbLive(true);
        if (docs.length > 0) {
          // Merge Firestore docs with any local-only drafts (temp IDs starting with 'V')
          setVehicles(function(prev) {
            var fsIds = docs.map(function(d){return d.id;});
            // Keep local-only items (temp ID, not yet in Firestore)
            var localOnly = prev.filter(function(v){
              return v.id && v.id.startsWith('V') && !fsIds.includes(v.id);
            });
            return localOnly.concat(docs);
          });
        } else {
          window.FB.fbSeedIfEmpty(SAMPLE_VEHICLES).catch(function(){});
        }
      });
    } catch(e) { console.warn('Firestore unavailable', e); }
    return function() { if (unsub) unsub(); };
  }, [fbReady]);

  var pendingCount = vehicles.filter(function(v){return v.status==='pending'||v.status==='review';}).length;

  function handleApprove(id, comment, approvedPrice) {
    var updates = {status:'approved',approved:new Date().toISOString().slice(0,10),approved_price:approvedPrice,approval_comment:comment};
    setVehicles(function(vs){return vs.map(function(v){return v.id===id?Object.assign({},v,updates):v;});});
    if (selVehicle && selVehicle.id === id) setSelVehicle(function(v){return Object.assign({},v,updates);});
    if (fbReady && window.FB) window.FB.fbUpdateVehicle(id, updates).catch(function(){});
    showToast('Approved & price set!','success');
  }

  function handleReject(id, comment) {
    var updates = {status:'rejected',rejection_comment:comment};
    setVehicles(function(vs){return vs.map(function(v){return v.id===id?Object.assign({},v,updates):v;});});
    if (selVehicle && selVehicle.id === id) setSelVehicle(function(v){return Object.assign({},v,updates);});
    if (fbReady && window.FB) window.FB.fbUpdateVehicle(id, updates).catch(function(){});
    showToast('Inspection rejected','error');
  }

  function handleUpdatePrice(id, price) {
    var updates = {approved_price:price};
    setVehicles(function(vs){return vs.map(function(v){return v.id===id?Object.assign({},v,updates):v;});});
    if (selVehicle && selVehicle.id === id) setSelVehicle(function(v){return Object.assign({},v,updates);});
    if (fbReady && window.FB) window.FB.fbUpdateVehicle(id, updates).catch(function(){});
    showToast('Price updated','success');
  }

  function handleNewVehicle(vehicle) {
    setSaving(true);
    showToast('Saving inspection to cloud...','info');
    // Add optimistic entry immediately so evaluator sees it
    setVehicles(function(vs){return [vehicle].concat(vs);});
    setPage('vehicles');
    if (fbReady && window.FB) {
      window.FB.fbSaveVehicle(vehicle).then(function(newId) {
        // Replace the temp-ID optimistic entry with the real Firestore ID
        setVehicles(function(vs){
          return vs.map(function(v){
            return v.id === vehicle.id ? Object.assign({},v,{id:newId}) : v;
          });
        });
        setSaving(false);
        showToast(vehicle.status==='draft'?'✓ Draft saved!':'✓ Submitted for Incharge approval!', 'success');
      }).catch(function(err) {
        console.error('Firestore save error:', err.message || err);
        setSaving(false);
        // Check if it's a Firestore permissions error
        var msg = err && err.message ? err.message : '';
        if (msg.includes('permission') || msg.includes('PERMISSION_DENIED')) {
          showToast('Firestore rules need updating — go to Firebase Console > Rules and set: allow read, write: if true;','error');
        } else if (msg.includes('quota') || msg.includes('resource-exhausted')) {
          showToast('Firestore quota reached. Try again later.','error');
        } else {
          showToast('Save failed: ' + (msg || 'Check internet connection'),'error');
        }
      });
    } else {
      setSaving(false);
      showToast(vehicle.status==='draft'?'✓ Draft saved!':'✓ Submitted for approval!','success');
    }
  }

  function handleDelete(id) {
    setVehicles(function(vs){return vs.filter(function(v){return v.id!==id;});});
    if (fbReady && window.FB) window.FB.fbDeleteVehicle(id).catch(function(){});
    showToast('Deleted','info');
  }

  var titles = {dash:'Dashboard',vehicles:user&&user.role==='officer'?'My Inspections':'All Vehicles',add:'New Inspection',approval:'Pending Approvals',mis:'MIS Dashboard',users:'Employee Database',detail:'Vehicle Detail'};

  if (!user) return <Login onLogin={function(u){setUser(u);setPage('dash');}} />;

  function renderPage() {
    if (page === 'dash') return <Dashboard vehicles={vehicles} user={user} setPage={setPage} />;
    if (page === 'vehicles') return <VehiclesList vehicles={vehicles} user={user} setPage={setPage} setSelectedVehicle={setSelVehicle} onAddNew={function(){setPage('add');}} onDelete={handleDelete} />;
    if (page === 'add') return <NewInspection user={user} onSubmit={handleNewVehicle} onCancel={function(){setPage('vehicles');}} showToast={showToast} />;
    if (page === 'approval') return <Approvals vehicles={vehicles} user={user} onApprove={handleApprove} onReject={handleReject} setPage={setPage} setSelectedVehicle={setSelVehicle} />;
    if (page === 'mis') return <MIS vehicles={vehicles} user={user} />;
    if (page === 'users') return <EmployeeDB vehicles={vehicles} showToast={showToast} />;
    if (page === 'detail') return <VehicleDetail vehicle={selVehicle} user={user} onBack={function(){setPage('vehicles');}} onApprove={handleApprove} onReject={handleReject} onUpdatePrice={handleUpdatePrice} />;
    return <Dashboard vehicles={vehicles} user={user} setPage={setPage} />;
  }

  return (
    <div style={{display:'flex',minHeight:'100vh',width:'100%',flexDirection:'inherit'}}>
      <Sidebar user={user} page={page} setPage={setPage} onLogout={function(){setUser(null);setPage('dash');}} pendingCount={pendingCount} />
      <div className="main">
        <div className="topbar">
          <div>
            <div className="tb-title">{titles[page]||'Utrust'}</div>
            <div className="tb-sub">Utrust Vehicle Management · {user.branch}</div>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <div style={{display:'flex',alignItems:'center',gap:5,fontSize:10,fontFamily:'DM Mono,monospace',padding:'3px 8px',borderRadius:4,background:dbLive?'var(--gdim)':'var(--sur2)',border:'1px solid '+(dbLive?'rgba(34,197,94,0.3)':'var(--bdr)'),color:dbLive?'var(--grn)':'var(--tx3)'}}>
              <div style={{width:6,height:6,borderRadius:'50%',background:dbLive?'var(--grn)':'var(--tx3)'}} />
              {saving?'Saving...':dbLive?'Cloud Live':'Local'}
            </div>
            {page !== 'add' && (user.role === 'officer' || user.role === 'admin') && (
              <button className="btn btn-acc btn-sm" onClick={function(){setPage('add');}}>➕ New</button>
            )}
          </div>
        </div>
        <div className="content">{renderPage()}</div>
      </div>
      {toast && <Toast message={toast.msg} type={toast.type} onClose={function(){setToast(null);}} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
